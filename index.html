<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Editor Pro</title>
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css"
    rel="stylesheet"
/>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="left">
                <div class="top">
                    <button class="btn">
                        <label>
                            Choose Image
                        <input type="file" id="image-input" accept="image/*" hidden>
                        </label>
                    </button>
                    <button class="btn" id="reset-btn">Reset</button>
                    <button class="btn" id="download-btn">Download</button>

                </div>
                <div class="bottom">
                    <div class="placeholder-image">
                        <i class="ri-image-line"></i>
                        <p>No image is chosen</p>
                        <canvas id="image-canvas"></canvas>
                    </div>
                </div>
            </div>
            <div class="right">
                <h2>Filters</h2>
                <div class="filters">
                </div>
                
                <h2>Transform</h2>
                <div class="transform-controls">
                    <button class="btn" id="rotate-left-btn">
                        <i class="ri-anticlockwise-line"></i> Rotate Left
                    </button>
                    <button class="btn" id="rotate-right-btn">
                        <i class="ri-clockwise-line"></i> Rotate Right
                    </button>
                    <button class="btn" id="flip-horizontal-btn">
                        <i class="ri-arrow-left-right-line"></i> Flip H
                    </button>
                    <button class="btn" id="flip-vertical-btn">
                        <i class="ri-arrow-up-down-line"></i> Flip V
                    </button>
                </div>
                
                <h2>Adjustments</h2>
                <div class="adjustments">
                    <div class="adjustment">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <p style="margin: 0; font-size: 0.9rem;">Zoom</p>
                            <span id="zoom-value" style="color: var(--text-secondary-color); font-size: 0.8rem;">100%</span>
                        </div>
                        <input type="range" id="zoom-slider" min="50" max="200" value="100">
                    </div>
                </div>
            </div>
        </section>
    </main>   
    <script src="script.js"></script> 
</body>
</html>
